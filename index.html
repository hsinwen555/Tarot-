<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary: #FFD700; --accent: #00CED1; --bg: #0a0f1d; }
        body { font-family: "微軟正黑體", sans-serif; background: radial-gradient(circle, #1b2735 0%, #080a0f 100%); color: #eee; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .control-panel { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 30px; }
        button.primary { padding: 12px 30px; background: linear-gradient(135deg, var(--accent), #008b8b); color: #000; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        button.primary:hover { box-shadow: 0 0 15px var(--accent); transform: translateY(-2px); }
        #board { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
        .card { width: 140px; padding: 20px; background: rgba(15, 25, 45, 0.95); border: 2px solid #333; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card.reversed { transform: rotate(180deg); border-color: #8b0000; }
        #report { max-width: 750px; margin: 40px auto; background: rgba(0, 0, 0, 0.85); padding: 35px; border-radius: 25px; text-align: left; display: none; border: 1px solid #444; }
        .oracle-item { border-bottom: 1px solid #333; padding: 25px 0; }
        .tag { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--accent); margin-bottom: 10px; display: inline-block; }
        .master-quote { color: var(--primary); font-style: italic; border-left: 3px solid var(--primary); padding-left: 15px; margin-top: 15px; background: rgba(255,215,0,0.05); padding: 10px 15px; }
        .summary-box { margin-top: 30px; padding: 20px; border-radius: 15px; text-align: center; font-size: 1.2em; border: 2px double; }
    </style>
</head>

        </select>
        <button class="primary" onclick="draw()">開啟啟示</button>
    </div>
    <div id="board"></div>
    <div id="report"><div id="reportContent"></div></div>
</div>

function draw() {
    const spreadKey = document.getElementById('spreadSelect').value;
    const labels = { "1":["今日啟示"], "3":["過去","現在","未來"], "yesno":["天啟判定"] }[spreadKey];
    const selected = [...fullTarotData].sort(() => 0.5 - Math.random()).slice(0, labels.length);
    
    let totalYes = 0;
    const board = document.getElementById('board');
    const reportContent = document.getElementById('reportContent');
    board.innerHTML = ""; reportContent.innerHTML = `<h2 style="text-align:center; color:var(--accent);">✦ 大 師 神 諭 ✦</h2>`;
    document.getElementById('report').style.display = 'block';

    selected.forEach((card, i) => {
        const isRev = Math.random() > 0.5;
        // 同步邏輯：正位(0.85) vs 逆位(0.15) 結合牌自身權重
        let prob = isRev ? 0.15 : 0.85;
        let finalProb = Math.max(0.02, Math.min(0.98, prob + (card.weight || 0)));
        const isYes = Math.random() < finalProb;
        if(isYes) totalYes++;

        board.innerHTML += `
            <div class="card ${isRev?'reversed':''}">
                <div style="font-size:3em;">${card.s}</div>
                <div style="font-weight:bold;margin-top:10px;">${card.n}</div>
                <div style="font-size:0.85em;color:var(--primary)">${isRev?'逆位':'正位'}</div>
            </div>`;

        const currentMeaning = isRev ? card.r : card.u;
        let masterQuote = isYes 
            ? `此時此刻，星空展現了「${currentMeaning}」的正向流動。大師見證了這股光芒，你可以信賴你的選擇。` 
            : `目前這股「${currentMeaning}」的能量似乎被厚重的雲層遮蔽。大師告誡：逆風而行必會受創，沈默是目前的答案。`;

        reportContent.innerHTML += `
            <div class="oracle-item">
                <span class="tag">✦ ${labels[i]} ✦</span>
                <strong>${card.n} (${isRev?'逆位':'正位'})</strong>
                <p>牌義解析：${currentMeaning}</p>
                ${spreadKey==='yesno' ? `<p style="color:${isYes?'var(--accent)':'#ff4d4d'}">判定結果：<strong>${isYes?'Yes':'No'}</strong></p>` : ''}
                <p class="master-quote">${masterQuote}</p>
            </div>`;
    });

    const ratio = totalYes / labels.length;
    let sText, sColor;
    if(ratio >= 0.7) { sText = "大師總結：順應天命，此行必成。"; sColor = "var(--accent)"; }
    else if(ratio >= 0.4) { sText = "大師總結：吉凶參半，守成為上。"; sColor = "var(--primary)"; }
    else { sText = "大師總結：星光黯淡，切莫強求。"; sColor = "#ff4d4d"; }

    reportContent.innerHTML += `<div class="summary-box" style="border-color:${sColor}; color:${sColor};">${sText}</div>`;
    window.scrollTo({ top: board.offsetTop - 50, behavior: 'smooth' });
}
