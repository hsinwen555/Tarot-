<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空塔羅 Oracle - 專業深度解讀版</title>
    <style>
        :root { --primary: #e0c3fc; --accent: #ffd700; --bg-dark: #000428; --card-bg: #1a0033; }
        body { 
            background: radial-gradient(circle at center, #001133, #000428 70%, #000000); 
            color: white; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            text-align: center; margin: 0; padding: 20px; min-height: 100vh; background-attachment: fixed;
        }
        h2 { margin: 20px 0; color: var(--primary); text-shadow: 0 0 20px var(--primary); letter-spacing: 5px; }
        .menu { margin: 25px 0; }
        select, button { padding: 12px 24px; margin: 8px; font-size: 16px; border-radius: 12px; border: 1px solid var(--primary); cursor: pointer; transition: 0.3s; }
        select { background: rgba(0,0,0,0.5); color: white; }
        button { background: #0066cc; color: white; border: none; }
        button:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 30px auto; max-width: 1000px; }
        .card { 
            width: 110px; height: 180px; position: relative; border-radius: 12px; 
            background: linear-gradient(135deg, var(--card-bg), #2a0055); border: 2px solid var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card.reversed { transform: rotate(180deg); }
        .card .back-symbol { font-size: 45px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--primary)); }
        .card .name { font-size: 14px; font-weight: bold; color: var(--accent); }
        .card .label { 
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
            background: rgba(74, 158, 255, 0.4); padding: 2px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap;
        }
        .card.reversed .label { transform: translateX(-50%) rotate(180deg); top: -30px; bottom: auto; }
        #report { 
            display: none; margin: 60px auto; max-width: 750px; background: rgba(10, 10, 25, 0.95); 
            padding: 30px; border-radius: 20px; text-align: left; border: 1px solid var(--primary);
        }
        .oracle-section { margin-bottom: 35px; padding: 20px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); position: relative; border-left: 4px solid var(--accent); }
        .oracle-title { color: var(--accent); font-size: 1.25em; margin-bottom: 15px; display: block; font-weight: bold; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 5px; }
        .advice-tag { display: inline-block; background: #4a9eff; color: #fff; padding: 2px 10px; border-radius: 4px; font-size: 0.85em; margin-right: 10px; font-weight: bold; }
        #allTarot { display: none; margin: 40px auto; max-width: 900px; background: rgba(0,0,0,0.7); padding: 25px; border-radius: 15px; }
        .tarot-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .tarot-card-full { background: rgba(255,255,255,0.06); padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); text-align: left; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>🔮 星空塔羅 Oracle</h2>

    <div class="menu">
        <select id="spread">
            <option value="1">✨ 每日一抽 (靈魂啟示)</option>
            <option value="3">⏳ 過去 / 現在 / 未來</option>
            <option value="rel">💖 關係深度連結</option>
            <option value="star">✡️ 五芒星能量場</option>
        </select>
        <br>
        <button onclick="draw()">開啟星辰之門</button>
    </div>

    <div id="board" class="board"></div>
    <div id="report"></div>

    <button onclick="toggleAllTarot()" style="background:#4a9eff; margin-top:80px; opacity: 0.7;">📖 檢視七十八張牌典</button>
    <div id="allTarot"><div class="tarot-list" id="tarotList"></div></div>

    <script>
        const tarotData = {
            majors: [
                { name: "愚者", symbol: "🃏", up: "純真與無限可能", rev: "盲目與魯莽衝動" },
                { name: "魔術師", symbol: "🪄", up: "掌握資源與顯化", rev: "能力錯位或欺瞞" },
                { name: "女教皇", symbol: "🌙", up: "內在直覺與靜默", rev: "隱瞞與忽略直覺" },
                { name: "女皇", symbol: "🌿", up: "感官享受與豐盛", rev: "情感索求或匱乏" },
                { name: "皇帝", symbol: "👑", up: "穩定結構與權威", rev: "掌控欲強或僵化" },
                { name: "教皇", symbol: "🕊️", up: "傳統價值與指引", rev: "盲從或打破規範" },
                { name: "戀人", symbol: "❤️", up: "和諧選擇與結合", rev: "價值觀衝突或逃避" },
                { name: "戰車", symbol: "⚔️", up: "意志力與跨越障礙", rev: "失去平衡或侵略性" },
                { name: "力量", symbol: "🦁", up: "溫柔的掌控力", rev: "自我懷疑或焦慮" },
                { name: "隱士", symbol: "🕯️", up: "內省與真理追尋", rev: "孤立感或逃避現實" },
                { name: "命運之輪", symbol: "🎡", up: "不可逆的轉折點", rev: "時機未到或抵抗改變" },
                { name: "正義", symbol: "⚖️", up: "平衡與因果責任", rev: "不公平或推卸責任" },
                { name: "倒吊人", symbol: "🦶", up: "換位思考與等待", rev: "無謂犧牲或拖延" },
                { name: "死神", symbol: "💀", up: "徹底終結與重生", rev: "執著過去或恐懼改變" },
                { name: "節制", symbol: "🏺", up: "煉金術式的融合", rev: "極端行為或溝通不良" },
                { name: "惡魔", symbol: "🔥", up: "慾望與物質束縛", rev: "意識覺醒與解脫" },
                { name: "高塔", symbol: "⚡", up: "結構崩解與真相", rev: "延緩災難或拒絕現實" },
                { name: "星星", symbol: "✨", up: "希望與靈感湧現", rev: "信心瓦解或幻滅" },
                { name: "月亮", symbol: "🔮", up: "潛意識與迷霧", rev: "恐懼消散或揭開真相" },
                { name: "太陽", symbol: "☀️", up: "明晰與生命力", rev: "短暫失落或過度樂觀" },
                { name: "審判", symbol: "🎺", up: "重生召喚與清晰", rev: "拒絕改變或自我審判" },
                { name: "世界", symbol: "🌍", up: "階段圓滿與統合", rev: "缺乏收尾或延遲完成" }
            ],
            suits: { "權杖": "🔥", "聖杯": "💧", "寶劍": "🌪️", "錢幣": "🌱" }
        };

        const spreads = {
            "1": ["今日運勢"],
            "3": ["過去背景", "現在現狀", "未來趨勢"],
            "rel": ["你的內在", "對方的投影", "互動模式", "核心障礙", "最終建議"],
            "star": ["現實根基", "情感流動", "意志行動", "思維智慧", "靈魂啟示"]
        };

        let fullDeck = [];
        function init() {
            fullDeck = [...tarotData.majors];
            Object.keys(tarotData.suits).forEach(s => {
                ["王牌", "2", "3", "4", "5", "6", "7", "8", "9", "10", "侍者", "騎士", "皇后", "國王"].forEach(r => {
                    fullDeck.push({ name: s + r, symbol: tarotData.suits[s], up: s+"能量的正面呈現", rev: s+"能量的失衡呈現" });
                });
            });
        }
        init();

        function getProfessionalAdvice(card, isRev, label) {
            const n = card.name;
            let ins = "", act = "";
            
            // 洞察邏輯 (Insight)
            if (tarotData.majors.some(m => m.name === n)) {
                ins = isRev ? `【命運轉捩】在「${label}」遇到能量停滯。這不是外在的錯，而是你的靈魂在抗拒某個必要的轉變。` : 
                              `【宇宙印證】「${label}」展現了強大的原型力量。你正站在命運的關鍵點上，這件事具有深遠影響。`;
            } else if (n.includes("王牌")) {
                ins = isRev ? `【種子枯萎】一個本該在「${label}」開啟的契機，可能因為你當前的猶豫而難以萌芽。` : 
                              `【純粹開端】宇宙在「${label}」為你開啟了一扇門，這是一股毫無雜質的新生力量。`;
            } else if (n.match(/(10|國王|皇后)/)) {
                ins = isRev ? `【圓滿之累】在「${label}」你可能抓得太緊了。成功的重量讓你感到疲憊，或陷入了僵化的掌控。` : 
                              `【頂峰收穫】「${label}」代表了一種成熟與穩定。你已經具備了主導這個局面的能力。`;
            } else {
                ins = isRev ? `【過程磨難】在「${label}」的進展不如預期，這是一個提醒：目前的策略可能與你的初衷背道而馳。` : 
                              `【穩定步履】這張牌在「${label}」顯示你正處於學習與積累的正常路徑上，請保持節奏。`;
            }

            // 行動邏輯 (Action)
            if (n.includes("權杖")) act = isRev ? "【火：熄滅】請暫停衝刺。你的熱情被誤導了，建議先釐清目標再行動。" : "【火：燃燒】不要猶豫！現在需要的是果敢的行動力與領導勇氣。";
            else if (n.includes("聖杯")) act = isRev ? "【水：乾涸】你的情緒過度消耗。請先照顧自己的感受，不要急著修補關係。" : "【水：滋養】信任你的直覺。這是一個適合表達愛與感性的時刻。";
            else if (n.includes("寶劍")) act = isRev ? "【風：亂流】你的思緒混亂，容易出現溝通誤解。請先保持沉默與靜心。" : "【風：切斷】展現理性與決斷。現在需要你冷靜地分析現狀，切除不必要的干擾。";
            else if (n.includes("錢幣")) act = isRev ? "【地：震盪】財物或現實根基不穩。請審視你的資源分配，不要在此刻冒險。" : "【地：豐收】腳踏實地地執行計畫。你的努力將轉化為看得見、摸得著的成果。";
            else act = isRev ? "回歸內心，在混亂中尋找那個不動的中心。這不是行動的時機，是覺察的時機。" : "帶著覺知前行。這是一個與更高自我契合的決定，請保持信心。";

            return { insight: ins, action: act };
        }

        function draw() {
            const spreadKey = document.getElementById('spread').value;
            const labels = spreads[spreadKey];
            const shuffled = [...fullDeck].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, labels.length);

            const board = document.getElementById('board');
            const report = document.getElementById('report');
            board.innerHTML = '';
            report.innerHTML = `<h2 style="text-align:center; color:var(--accent);">✧ 星 辰 啟 示 錄 ✧</h2>`;
            report.style.display = 'block';

            selected.forEach((card, i) => {
                const isRev = Math.random() > 0.5;
                const advice = getProfessionalAdvice(card, isRev, labels[i]);
                
                const cardDiv = document.createElement('div');
                cardDiv.className = `card ${isRev ? 'reversed' : ''}`;
                cardDiv.innerHTML = `<div class="content"><div class="back-symbol">${card.symbol}</div><div class="name">${card.name}</div><div class="orientation">${isRev?'逆位':'正位'}</div><div class="label">${labels[i]}</div></div>`;
                board.appendChild(cardDiv);

                report.innerHTML += `
                    <div class="oracle-section">
                        <span class="oracle-title">${labels[i]}：${card.name} (${isRev?'逆位':'正位'})</span>
                        <p><span class="advice-tag">啟示</span>${isRev ? card.rev : card.up}</p>
                        <p><span class="advice-tag" style="background:#666;">洞察</span>${advice.insight}</p>
                        <p style="color:var(--primary); font-weight:bold;"><span class="advice-tag" style="background:var(--primary); color:#000;">行動</span>${advice.action}</p>
                    </div>`;
            });
            window.scrollTo({ top: board.offsetTop - 50, behavior: 'smooth' });
        }

        function toggleAllTarot() {
            const list = document.getElementById('tarotList');
            const container = document.getElementById('allTarot');
            if (container.style.display === 'block') { container.style.display = 'none'; return; }
            list.innerHTML = fullDeck.map(c => `<div class="tarot-card-full"><strong>${c.symbol} ${c.name}</strong><br>正：${c.up}<br><span style="color:var(--primary)">逆：${c.rev}</span></div>`).join('');
            container.style.display = 'block';
        }
    </script>
</body>
</html>
