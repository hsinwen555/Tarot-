<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星空靈感塔羅 - 文字備援版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main: #4facfe; --bg: #000428; --gold: #ffd700; --card: #004e92; }
        body { background: #000428; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .menu { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--main); }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .card-slot { width: 85px; height: 145px; cursor: pointer; perspective: 1000px; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-slot.flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 2px solid var(--main); overflow: hidden; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .back { background: var(--card); color: var(--main); font-weight: bold; font-size: 11px; text-align: center; padding: 5px; }
        .front { background: white; transform: rotateY(180deg); border-color: var(--gold); flex-direction: column; }
        .front img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .reversed img { transform: rotate(180deg); }
        /* 文字備援樣式 */
        .front .backup-text { display: none; color: #000; font-weight: bold; font-size: 14px; text-align: center; width: 100%; }
        .image-error img { display: none !class; }
        .image-error .backup-text { display: block !important; }

        #report { text-align: left; background: rgba(0,0,30,0.85); padding: 15px; border-radius: 10px; display: none; border: 1px solid var(--gold); }
        .item { margin-bottom: 12px; border-left: 4px solid var(--gold); padding-left: 10px; font-size: 14px; line-height: 1.5; }
        button { background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; margin: 5px; cursor: pointer; color: #000428; }
        #saveBtn { background: #ffd700; display: none; }
        select { padding: 10px; border-radius: 8px; background: #001529; color: white; border: 1px solid var(--main); width: 100%; max-width: 280px; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>🌌 星空靈感塔羅</h2>
    <div class="menu">
        <select id="spreadType" onchange="init()">
            <option value="1">✨ 每日一抽</option>
            <option value="3">⌛ 聖三角 (過/現/未)</option>
            <option value="rel">💞 關係解碼 (你/他/連結)</option>
            <option value="soul">🧘 身心靈 (身/心/靈)</option>
            <option value="choice">⚖️ 二選一 (A/B/建議)</option>
            <option value="week">📅 週運勢 (事/財/情)</option>
            <option value="star">⭐️ 五芒星 (本質/挑戰/策略/環境/結果)</option>
        </select><br>
        <button onclick="init()">重新洗牌啟程</button>
    </div>
    <div id="capture">
        <div class="board" id="board"></div>
        <div id="report"><h3 style="color:var(--gold); margin-top:0;">📜 啟示報告</h3><div id="details"></div></div>
    </div>
    <button id="saveBtn" onclick="save()">📸 保存占卜小卡</button>

<script>
    // 雖然換成更穩定的 jsDelivr，但我們依舊計提文字備援
    const base = "https://cdn.jsdelivr.net/gh/CiroSantilli/universal-test-files@master/images/tarot/rider-waite-smith/";
    const majF = ["00-the-fool","01-the-magician","02-the-high-priestess","03-the-empress","04-the-emperor","05-the-hierophant","06-the-lovers","07-the-chariot","08-strength","09-the-hermit","10-wheel-of-fortune","11-justice","12-the-hanged-man","13-death","14-temperance","15-the-devil","16-the-tower","17-the-star","18-the-moon","19-the-sun","20-judgement","21-the-world"];
    const majL = ["愚者","魔術師","女教皇","皇后","皇帝","教皇","戀人","戰車","力量","隱士","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界"];
    const majD = { "愚者":"信任直覺開啟冒險。","魔術師":"掌握資源主動出擊。","女教皇":"沈靜觀察聆聽直覺。","皇后":"能量豐盛滋養感受。","皇帝":"理性領導建立秩序。","教皇":"尋求指引遵循傳統。","戀人":"心靈連結關鍵抉擇。","戰車":"意志克服勇往直前。","力量":"以柔克剛控制慾望。","隱士":"內省探索孤獨明燈。","命運之輪":"順應週期接受轉折。","正義":"因果平衡誠實面對。","倒吊人":"換個角度沈思等待。","死神":"結束舊章迎接重生。","節制":"和諧調和尋找中庸。","惡魔":"警惕執著認清枷鎖。","高塔":"震撼重組瓦解虛假。","星星":"希望回升平靜修復。","月亮":"迷霧不安穿透潛意識。","太陽":"光明快樂大放異彩。","審判":"甦醒覺悟過去轉化。","世界":"圓滿結束完美境界。" };

    const sN = {"權杖":"wands","聖杯":"cups","寶劍":"swords","錢幣":"pentacles"};
    const rF = {"A":"ace","2":"02","3":"03","4":"04","5":"05","6":"06","7":"07","8":"08","9":"09","10":"10","侍者":"page","騎士":"knight","皇后":"queen","國王":"king"};
    const sD = {"權杖":"行動與熱情","聖杯":"情感與直覺","寶劍":"邏輯與思考","錢幣":"物質與財務"};
    const rD = {"A":"全新開端。","2":"選擇平衡。","3":"初步成果。","4":"穩固守成。","5":"變動挑戰.","6":"和諧回饋。","7":"防禦評估。","8":"效率速度。","9":"成就收穫。","10":"傳承圓滿。","侍者":"消息與學習。","騎士":"衝勁執行。","皇后":"掌控滋養。","國王":"權威經驗。"};

    let deck = [];
    majL.forEach((n, i) => deck.push({ n, img: `${base}${majF[i]}.jpg`, t:'M' }));
    Object.keys(sN).forEach(s => Object.keys(rF).forEach(r => deck.push({ n: s+r, img: `${base}${sN[s]}-${rF[r]}.jpg`, t:'m', s, r })));

    const spr = { "1":["啟示"],"3":["過去","現在","未來"],"rel":["你","他","連結"],"soul":["身","心","靈"],"choice":["方案A","方案B","指引"],"week":["事業運","財富運","情感運"],"star":["本質","挑戰","策略","環境","結果"] };

    function init() {
        const type = document.getElementById('spreadType').value;
        const b = document.getElementById('board');
        b.innerHTML = ''; document.getElementById('report').style.display='none';
        document.getElementById('details').innerHTML=''; document.getElementById('saveBtn').style.display='none';
        let shuf = [...deck].sort(() => Math.random() - 0.5);
        spr[type].forEach(pos => {
            const card = shuf.pop();
            const isR = Math.random() > 0.3;
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            // 核心修正：加入 onerror 監聽，並將 alt 設為牌名以作為文字備援
            slot.innerHTML = `<div class="inner"><div class="back">${pos}</div><div class="front ${isR?'reversed':''}"><img src="${card.img}" alt="${card.n}" onerror="handleImageError(this)"><div class="backup-text">${card.n}</div></div></div>`;
            slot.onclick = () => {
                if(!slot.classList.contains('flipped')) {
                    slot.classList.add('flipped');
                    addText(pos, card, isR);
                    if(document.querySelectorAll('.flipped').length === spr[type].length) document.getElementById('saveBtn').style.display='inline-block';
                }
            };
            b.appendChild(slot);
        });
    }

    // 文字備援處理函式
    function handleImageError(img) {
        // 將父元素（.front）標記為錯誤狀態
        img.parentElement.classList.add('image-error');
        // 隱藏圖片並顯示備援文字
        img.style.display = 'none';
        console.log(`資產失效，已啟動文字備援：${img.alt}`);
    }

    function addText(p, c, r) {
        document.getElementById('report').style.display='block';
        let main = c.t === 'M' ? majD[c.n] : `這是關於「${sD[c.s]}」的「${rD[c.r]}」`;
        let sub = r ? "（逆位提醒：能量停滯，不宜強求。）" : "（正位導引：能量正向，請把握機會。）";
        document.getElementById('details').innerHTML += `<div class="item"><b>【${p}】${c.n} (${r?'逆':'正'})</b><br>✦ ${main}<br>✦ ${sub}</div>`;
    }

    async function save() {
        const canvas = await html2canvas(document.getElementById('capture'), {backgroundColor:'#000428', useCORS: true});
        const link = document.createElement('a'); link.download='tarot.png'; link.href=canvas.toDataURL(); link.click();
    }
    init();
</script>
</body>
</html>
