    <title>塔羅解析 - Rider-Waite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: radial-gradient(circle at center, #0a1128 0%, #000 100%);
            --accent: #e0c3fc; 
            --card-front: #1a3a5a;
        }
        body {
            background: var(--bg-color); color: #f0f0f0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .menu {
            background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(224, 195, 252, 0.2); margin-bottom: 20px; width: 90%; max-width: 450px; text-align: center;
        }
        select, button {
            padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid var(--accent);
            background: #111; color: var(--accent); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        
        #capture {
            padding: 30px 15px; width: 100%; max-width: 600px;
            background: #0a1128; border-radius: 20px;
        }
        .board { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 25px; 
        }
        
        .card {
            width: 110px; height: 180px; position: relative;
        }
        .card img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
            border: 2px solid rgba(224, 195, 252, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card.reversed img {
            transform: rotate(180deg);
        }
        .position-label {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 12px;
            font-size: 12px; pointer-events: none;
        }

        #report {
            display: none; background: rgba(0, 0, 0, 0.7); padding: 25px;
            border-radius: 15px; border-left: 5px solid var(--accent);
            text-align: left; line-height: 1.8; font-size: 15px;
        }
        .report-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
