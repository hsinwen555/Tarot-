<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空塔羅</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    background: #0a0519;
    position: relative;
    overflow: hidden;
    color:white;
    font-family:sans-serif;
    text-align:center;
    min-height: 100vh;
}

/* 星空背景（星星 + 星雲） */
body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
        radial-gradient(circle, #ffffff 1px, transparent 1px),
        radial-gradient(circle, #ffffff 1px, transparent 1px),
        radial-gradient(circle, rgba(180,220,255,0.85) 1px, transparent 2px);
    background-size: 150px 150px, 95px 95px, 220px 220px;
    background-position: 0 0, 35px 55px, 80px 25px;
    opacity: 0.28;
    animation: starMove 180s linear infinite;
    pointer-events: none;
    z-index: -1;
}

body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 35% 25%, rgba(140, 200, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(220, 160, 255, 0.15) 0%, transparent 65%);
    opacity: 0.65;
    animation: twinkle 9s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: -1;
}

@keyframes starMove {
    from { background-position: 0 0, 35px 55px, 80px 25px; }
    to { background-position: 120px 90px, 150px 160px, 200px 80px; }
}

@keyframes twinkle {
    0% { opacity: 0.55; }
    100% { opacity: 0.88; }
}

.menu{margin:15px;}
select{padding:10px;width:90%;}
.board{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}
.card{
    width:115px;
    height:165px;
    background: rgba(15, 25, 65, 0.92);
    border: 1px solid rgba(120, 190, 255, 0.35);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px;
    box-shadow: 0 8px 25px rgba(80, 160, 255, 0.25);
    font-size:14.5px;
    line-height:1.45;
    z-index: 1;
}
.card strong { 
    font-size:16px; 
    color: #a0e0ff;
}
.card small { 
    font-size:12.5px; 
    color:#80c0ff; 
    margin-top:6px;
}
#report{
    display:none;
    margin-top:25px;
    background:rgba(0,0,0,0.85);
    padding:18px;
    text-align:left;
    line-height:1.75;
    border-radius:12px;
    max-width:620px;
    margin-left:auto;
    margin-right:auto;
}
button{margin:8px;padding:11px 24px; border-radius:8px;}
</style>
</head>

<body>

<h2>🔮 星空塔羅</h2>

<div class="menu">
<select id="spread">
<option value="1">單張抽牌</option>
<option value="3">過去 / 現在 / 未來</option>
<option value="rel">關係</option>
<option value="star">五芒星</option>
</select>
<br>
<button onclick="draw()">開始占卜</button>
</div>

<div id="capture">
<div class="board" id="board"></div>
<div id="report"></div>
</div>

<button onclick="save()">📸 存圖</button>

<script>

// 牌組
const cards=[
"愚者","魔術師","女教皇","皇后","皇帝",
"戀人","戰車","力量","隱士","命運之輪",
"正義","死神","節制","惡魔","高塔",
"星星","月亮","太陽","審判","世界"
];

const spreads={
"1":["啟示"],
"3":["過去","現在","未來"],
"rel":["你","對方","連結"],
"star":["核心","挑戰","環境","策略","結果"]
};

let result=[];

// 🔮 抽牌（直接顯示）
function draw(){
    let type=document.getElementById("spread").value;
    let board=document.getElementById("board");

    board.innerHTML="🔮 正在讀取你的能量...";

    setTimeout(()=>{

        board.innerHTML="";
        result=[];

        spreads[type].forEach(pos=>{
            let name=cards[Math.floor(Math.random()*cards.length)];
            let rev=Math.random()>0.5;

            result.push({pos,name,rev});

            let div=document.createElement("div");
            div.className="card";
            div.innerHTML = `
                <strong>${pos}</strong><br>
                ${name}<br>
                <small>${rev ? "逆位" : "正位"}</small>
            `;

            board.appendChild(div);
        });

        generate();

    },1200);
}

// 其餘功能不變（省略以節省篇幅，與上次完全相同）
function detectTheme(){
    let names=result.map(r=>r.name);
    if(names.includes("戀人")) return "love";
    if(names.includes("皇帝") || names.includes("魔術師")) return "career";
    if(names.includes("命運之輪")) return "money";
    return "general";
}

function generate(){
    let revCount=result.filter(r=>r.rev).length;
    let tone = revCount <= 1 ? "good" : (revCount >= 3 ? "bad" : "mid");

    let theme=detectTheme();

    let open=pick([
        "你現在的狀態，其實已經很明顯了。",
        "這組牌沒有在跟你隱藏什麼。",
        "你目前正站在一個關鍵點上。"
    ]);

    let detail=result.map(r=>`${r.pos}出現「${r.name}${r.rev?"（逆位）":"」"}`).join("，");

    let core = theme==="love" ? "這段關係其實不是表面那麼單純，你內心已經有感覺了。" :
               theme==="career" ? "這跟你的方向與選擇有關，你正在評估下一步。" :
               theme==="money" ? "這牽涉到資源與現實壓力，你其實有在計算風險。" :
               "這代表你目前處於一種內外不一致的狀態。";

    let advice = tone==="good" ? "可以前進，但不要急，穩住會更好。" :
                 tone==="bad" ? "現在不適合硬衝，先停下來重新整理。" :
                 "觀察比行動更重要，時機還沒完全成形。";

    let ending=pick([
        "很多事情，其實你心裡早就知道。",
        "你不是不知道答案，只是還沒決定。",
        "真正的關鍵，其實在你自己。"
    ]);

    let text=`
${open}

從牌面來看，${detail}。

${core}

👉 建議：
${advice}

✨ 提醒：
${ending}
`;

    let r=document.getElementById("report");
    r.style.display="block";
    r.innerText=text;
}

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

async function save(){
    const canvas=await html2canvas(document.getElementById("capture"),{scale:2});
    window.open(canvas.toDataURL());
}

</script>

</body>
</html>
