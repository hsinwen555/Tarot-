<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空啟示 - 全邏輯神諭</title>
    <style>
        :root { --primary: #FFD700; --accent: #00CED1; --bg: #0a0f1d; }
        body { font-family: "微軟正黑體", sans-serif; background: radial-gradient(circle, #1b2735 0%, #080a0f 100%); color: #eee; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .control-panel { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 15px; border: 1px solid #444; margin-bottom: 30px; }
        select, button { padding: 12px 20px; border-radius: 8px; border: none; font-size: 1em; cursor: pointer; }
        button.primary { background: var(--accent); color: #000; font-weight: bold; transition: 0.3s; }
        button.primary:hover { box-shadow: 0 0 15px var(--accent); }
        #board { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .card { width: 130px; padding: 20px; background: rgba(15, 25, 45, 0.95); border: 2px solid #333; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card.reversed { transform: rotate(180deg); border-color: #8b0000; }
        #report { max-width: 750px; margin: 40px auto; background: rgba(0, 0, 0, 0.85); padding: 35px; border-radius: 25px; text-align: left; display: none; border: 1px solid #444; }
        .oracle-item { border-bottom: 1px solid #333; padding: 25px 0; }
        .tag { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--accent); margin-bottom: 10px; display: inline-block; }
        .insight-quote { color: var(--primary); font-style: italic; border-left: 3px solid var(--primary); padding-left: 15px; margin-top: 15px; background: rgba(255,215,0,0.05); padding: 10px; }
        .summary-box { margin-top: 30px; padding: 20px; border-radius: 15px; text-align: center; font-size: 1.2em; border: 2px double; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:var(--accent); text-shadow: 0 0 15px var(--accent); letter-spacing: 5px;">✦ 星 空 啟 示 ✦</h1>
    <div class="control-panel">
        <select id="spreadSelect" style="background:#222; color:#fff; padding:10px;">
            <option value="yesno">天啟決策 (Yes/No)</option>
            <option value="3">時空流動 (過去/現在/未來)</option>
            <option value="love">情感連結 (五張牌陣)</option>
        </select>
        <button class="primary" onclick="draw()">開啟啟示</button>
    </div>
    <div id="board"></div>
    <div id="report"><div id="reportContent"></div></div>
</div>

    {n:"錢幣國王", s:"👑", u:"Yes", r:"No", ut:"成就掌控", rt:"物質主義"}

function draw() {
    const spreadKey = document.getElementById('spreadSelect').value;
    const configs = { 
        "yesno":["天啟判定"], 
        "3":["過去","現在","未來"], 
        "love":["當下狀態","對象心態","互動能量","核心挑戰","指引建議"] 
    };
    const labels = configs[spreadKey];
    const selected = [...fullDeck].sort(() => 0.5 - Math.random()).slice(0, labels.length);
    
    let totalYes = 0;
    const board = document.getElementById('board');
    const reportContent = document.getElementById('reportContent');
    board.innerHTML = ""; reportContent.innerHTML = "";
    document.getElementById('report').style.display = 'block';

    selected.forEach((card, i) => {
        const isRev = Math.random() > 0.5;
        const result = isRev ? card.r : card.u;
        const currentMeaning = isRev ? card.rt : card.ut;

        if(result === "Yes") totalYes++;

        board.innerHTML += `
            <div class="card ${isRev?'reversed':''}">
                <div style="font-size:3em;">${card.s}</div>
                <div style="font-weight:bold;margin-top:10px;">${card.n}</div>
                <div style="font-size:0.85em;color:var(--primary)">${isRev?'逆位':'正位'}</div>
            </div>`;

        // 自動化文本分流：修正「正向流動」誤用問題
        let quote = "";
        if(result === "Yes") {
            quote = `此時能量流向「${currentMeaning}」，代表目前的進展符合契機，請專注於此光芒。`;
        } else if(result === "Maybe") {
            quote = `此時能量呈現「${currentMeaning}」，局勢尚不明朗，建議靜觀其變。`;
        } else {
            quote = `此時能量受困於「${currentMeaning}」，代表目前存在阻礙，建議暫緩行動。`;
        }

        reportContent.innerHTML += `
            <div class="oracle-item">
                <span class="tag">✦ ${labels[i]} ✦</span>
                <h3 style="margin:5px 0;">${card.n} (${isRev?'逆位':'正位'})</h3>
                <p><strong>能量解析：</strong>${currentMeaning}</p>
                ${spreadKey==='yesno' ? `<p style="color:${result==='Yes'?'var(--accent)':'#ff4d4d'}">判定結果：<strong>${result}</strong></p>` : ''}
                <p class="insight-quote">${quote}</p>
            </div>`;
    });

    // 最終總結邏輯
    const ratio = totalYes / labels.length;
    let sText, sColor;
    if(ratio >= 0.7) { sText = "啟示：能量交匯，順勢前行必有所獲。"; sColor = "var(--accent)"; }
    else if(ratio >= 0.4) { sText = "啟示：吉凶參半，守護內心平衡為重。"; sColor = "var(--primary)"; }
    else { sText = "啟示：星辰隱沒，此刻不宜輕舉妄動。"; sColor = "#ff4d4d"; }

    reportContent.innerHTML += `<div class="summary-box" style="border-color:${sColor}; color:${sColor};">${sText}</div>`;
}
</script>
</body>
</html>
