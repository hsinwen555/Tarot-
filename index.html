    <style>

        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .control-panel { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 15px; border: 1px solid #444; margin-bottom: 30px; }
        .spread-options { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .spread-card { flex: 1; min-width: 140px; max-width: 200px; padding: 18px 12px; border-radius: 12px; border: 2px solid #444; background: rgba(255,255,255,0.04); cursor: pointer; transition: 0.3s; text-align: center; }
        .spread-card:hover { border-color: var(--accent); background: rgba(0,206,209,0.08); }
        .spread-card.active { border-color: var(--accent); background: rgba(0,206,209,0.15); box-shadow: 0 0 15px rgba(0,206,209,0.3); }
        .spread-card .spread-icon { font-size: 2em; margin-bottom: 8px; }
        .spread-card .spread-name { font-weight: bold; color: var(--accent); font-size: 1em; }
        .spread-card .spread-desc { font-size: 0.78em; color: #aaa; margin-top: 5px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-size: 1em; cursor: pointer; }
        button.primary { background: var(--accent); color: #000; font-weight: bold; transition: 0.3s; padding: 14px 40px; font-size: 1.1em; }
        button.primary:hover { box-shadow: 0 0 15px var(--accent); }
        #board { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .card { width: 130px; padding: 20px; background: rgba(15, 25, 45, 0.95); border: 2px solid #333; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .card.reversed { transform: rotate(180deg); border-color: #8b0000; }
        #report { max-width: 750px; margin: 40px auto; background: rgba(0, 0, 0, 0.85); padding: 35px; border-radius: 25px; text-align: left; display: none; border: 1px solid #444; }
        .oracle-item { border-bottom: 1px solid #333; padding: 25px 0; }
        .tag { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--accent); margin-bottom: 10px; display: inline-block; }
        .insight-quote { color: var(--primary); font-style: italic; border-left: 3px solid var(--primary); padding-left: 15px; margin-top: 15px; background: rgba(255,215,0,0.05); padding: 10px; border-radius: 0 8px 8px 0; }
        .summary-box { margin-top: 30px; padding: 20px; border-radius: 15px; text-align: center; font-size: 1.2em; border: 2px double; }
        .ai-section { margin-top: 30px; border-top: 1px solid #444; padding-top: 25px; }
        .ai-title { color: var(--primary); font-size: 1.1em; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; }
        .ai-box { background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.3); border-radius: 15px; padding: 20px; color: #ddd; line-height: 1.9; font-size: 0.97em; text-align: left; white-space: pre-wrap; }
        .ai-loading { color: #aaa; font-style: italic; text-align: center; padding: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>

let currentSpread = 'yesno';

function selectSpread(key, el) {
    currentSpread = key;
    document.querySelectorAll('.spread-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function draw() {
    const spreadKey = currentSpread;
    const configs = { "yesno":["天啟判定"],"3":["過去","現在","未來"],"love":["當下狀態","對象心態","互動能量","核心挑戰","指引建議"] };
    const labels = configs[spreadKey];
    const selected = [...fullDeck].sort(() => 0.5 - Math.random()).slice(0, labels.length);
    
    let totalYes = 0;
    const drawnCards = [];
    const board = document.getElementById('board');
    const reportContent = document.getElementById('reportContent');
    board.innerHTML = ""; reportContent.innerHTML = "";
    document.getElementById('report').style.display = 'block';

    selected.forEach((card, i) => {
        const isRev = Math.random() > 0.5;
        drawnCards.push({ isRev });
        const result = isRev ? card.r : card.u;
        const meaning = isRev ? card.rt : card.ut;

        if(result === "Yes") totalYes++;

        board.innerHTML += `
            <div class="card ${isRev?'reversed':''}">
                <div style="font-size:3em;">${card.s}</div>
                <div style="font-weight:bold;margin-top:10px;">${card.n}</div>
                <div style="font-size:0.85em;color:var(--primary)">${isRev?'逆位':'正位'}</div>
            </div>`;

        let quote = result === "Yes" 
            ? `此時能量流向「${meaning}」。這代表目前的局勢具備流暢的動能，是一個契合時機的順勢流動。`
            : result === "Maybe"
            ? `此時能量呈現「${meaning}」。局勢尚不明朗，且伴隨一定的審核機制，建議暫緩決策。`
            : `此時能量受困於「${meaning}」。這象徵目前的局勢存在冷硬的阻礙或嚴苛的限制，建議停止強求。`;

        reportContent.innerHTML += `
            <div class="oracle-item">
                <span class="tag">✦ ${labels[i]} ✦</span>
                <h3 style="margin:5px 0;">${card.n} (${isRev?'逆位':'正位'})</h3>
                <p><strong>能量深度解析：</strong>${meaning}</p>
                ${spreadKey==='yesno' ? `<p style="color:${result==='Yes'?'var(--accent)':'var(--no-color)'}">判定結果：<strong>${result}</strong></p>` : ''}
                <p class="insight-quote">${quote}</p>
            </div>`;
    });

    const ratio = totalYes / labels.length;
    let sText, sColor;
    if(ratio >= 0.7) { sText = "啟示：能量全面交匯，順勢前行必有所獲。"; sColor = "var(--accent)"; }
    else if(ratio >= 0.4) { sText = "啟示：吉凶參半，理智與感性需守護平衡。"; sColor = "var(--primary)"; }
    else { sText = "啟示：星辰隱沒，能量受阻，此刻不宜輕舉妄動。"; sColor = "var(--no-color)"; }

    reportContent.innerHTML += `<div class="summary-box" style="border-color:${sColor}; color:${sColor};">${sText}</div>`;

    // AI 解讀區塊
    reportContent.innerHTML += `
        <div class="ai-section">
            <div class="ai-title">✦ 星靈 AI 深度解讀 ✦</div>
            <div class="ai-box" id="aiBox"><div class="ai-loading">✨ 星靈正在解讀你的牌陣，請稍候...</div></div>
        </div>`;

    // 組成給 AI 的 prompt
    const spreadNames = {"yesno":"天啟決策（Yes/No）","3":"時空流動（過去/現在/未來）","love":"情感連結（五張牌陣）"};
    const cardSummary = selected.map((card, i) => {
        const isRev = drawnCards[i].isRev;
        const meaning = isRev ? card.rt : card.ut;
        return `${labels[i]}：${card.n}（${isRev?'逆位':'正位'}）— ${meaning}`;
    }).join('\n');

    const prompt = `你是一位充滿靈性智慧的塔羅解讀師，請用溫暖而深刻的語氣，針對以下牌陣給出整體性的深度解讀。

牌陣類型：${spreadNames[spreadKey]}

抽到的牌：
${cardSummary}

請針對這組牌陣的整體訊息給出150～250字的中文解讀，包含：各牌之間的能量流動與關聯、當事人目前面臨的核心課題、以及最後一句具體的行動建議。語氣要像一位智慧長者在對話，不要條列式，要用流暢的段落。`;

    getAIReading(prompt);
}

async function getAIReading(prompt) {
    const aiBox = document.getElementById('aiBox');
    const GEMINI_KEY = "AIzaSyDxiFwDOF7ouTKcwb-FoM7dhsKt0sgJHJY";
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });
        if (!response.ok) {
            const err = await response.json();
            aiBox.innerHTML = "⚠️ API錯誤：" + (err.error?.message || response.status);
            return;
        }
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "星靈暫時無法解讀，請稍後再試。";
        aiBox.innerHTML = text.replace(/\n/g, '<br>');
    } catch(e) {
        aiBox.innerHTML = "⚠️ 連線錯誤：" + e.message;
    }
}
