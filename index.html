<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空塔羅・最終進化版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    background: radial-gradient(circle,#004e92,#000428);
    color:white;
    font-family:sans-serif;
    text-align:center;
}
.menu{margin:15px;}
select{padding:10px;width:90%;}
.board{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}
.card{
    width:90px;height:140px;
    background:#004e92;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}
#report{
    display:none;
    margin-top:20px;
    background:#000;
    padding:15px;
    text-align:left;
    line-height:1.7;
}
button{margin:5px;padding:10px 20px;}
</style>
</head>

<body>

<h2>🔮 星空塔羅・最終進化</h2>

<div class="menu">
<select id="spread">
<option value="1">每日一抽</option>
<option value="3">過去 / 現在 / 未來</option>
<option value="rel">關係</option>
<option value="star">五芒星</option>
</select>
<br>
<button onclick="draw()">開始占卜</button>
</div>

<div id="capture">
<div class="board" id="board"></div>
<div id="report"></div>
</div>

<button onclick="save()">📸 存圖</button>

<script>

// 牌組
const cards=[
"愚者","魔術師","女教皇","皇后","皇帝",
"戀人","戰車","力量","隱士","命運之輪",
"正義","死神","節制","惡魔","高塔",
"星星","月亮","太陽","審判","世界"
];

const spreads={
"1":["啟示"],
"3":["過去","現在","未來"],
"rel":["你","對方","連結"],
"star":["核心","挑戰","環境","策略","結果"]
};

let result=[];

// 🔮 抽牌
function draw(){

    let today=new Date().toDateString();
    if(localStorage.getItem("tarot")==today){
        alert("今天已抽過 🔮");
        return;
    }
    localStorage.setItem("tarot",today);

    let type=document.getElementById("spread").value;
    let board=document.getElementById("board");

    board.innerHTML="🔮 正在讀取你的能量...";

    setTimeout(()=>{

        board.innerHTML="";
        result=[];

        spreads[type].forEach(pos=>{
            let name=cards[Math.floor(Math.random()*cards.length)];
            let rev=Math.random()>0.5;

            result.push({pos,name,rev});

            let div=document.createElement("div");
            div.className="card";
            div.innerHTML=pos;

            div.onclick=()=>{
                div.innerHTML=`${name}<br>${rev?"逆":"正"}`;
            };

            board.appendChild(div);
        });

        generate();

    },1200);
}

// 🧠 判斷情境
function detectTheme(){

    let names=result.map(r=>r.name);

    if(names.includes("戀人")) return "love";
    if(names.includes("皇帝") || names.includes("魔術師")) return "career";
    if(names.includes("命運之輪")) return "money";

    return "general";
}

// 🧠 主生成
function generate(){

    let revCount=result.filter(r=>r.rev).length;
    let tone;

    if(revCount<=1) tone="good";
    else if(revCount>=3) tone="bad";
    else tone="mid";

    let theme=detectTheme();

    let open=pick([
        "你現在的狀態，其實已經很明顯了。",
        "這組牌沒有在跟你隱藏什麼。",
        "你目前正站在一個關鍵點上。"
    ]);

    let detail=result.map(r=>`${r.pos}出現「${r.name}${r.rev?"（逆位）":"」"}`).join("，");

    let core;

    if(theme==="love"){
        core="這段關係其實不是表面那麼單純，你內心已經有感覺了。";
    }
    if(theme==="career"){
        core="這跟你的方向與選擇有關，你正在評估下一步。";
    }
    if(theme==="money"){
        core="這牽涉到資源與現實壓力，你其實有在計算風險。";
    }
    if(theme==="general"){
        core="這代表你目前處於一種內外不一致的狀態。";
    }

    let advice;

    if(tone==="good"){
        advice="可以前進，但不要急，穩住會更好。";
    }
    if(tone==="bad"){
        advice="現在不適合硬衝，先停下來重新整理。";
    }
    if(tone==="mid"){
        advice="觀察比行動更重要，時機還沒完全成形。";
    }

    let ending=pick([
        "很多事情，其實你心裡早就知道。",
        "你不是不知道答案，只是還沒決定。",
        "真正的關鍵，其實在你自己。"
    ]);

    let text=`
${open}

從牌面來看，${detail}。

${core}

👉 建議：
${advice}

✨ 提醒：
${ending}
`;

    let r=document.getElementById("report");
    r.style.display="block";
    r.innerText=text;
}

// 工具
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// 存圖
async function save(){
    const canvas=await html2canvas(document.getElementById("capture"),{scale:2});
    window.open(canvas.toDataURL());
}

</script>

</body>
</html>
