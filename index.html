<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星空靈感塔羅 - 專業正式版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main: #4facfe; --bg: #000428; --gold: #ffd700; --card-bg: #004e92; }
        body { background: radial-gradient(circle at center, #004e92 0%, #000428 100%); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        .menu { background: rgba(255,255,255,0.08); padding: 18px; border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(79,172,254,0.3); backdrop-filter: blur(5px); }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .card-slot { width: 90px; height: 155px; cursor: pointer; perspective: 1000px; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card-slot.flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid var(--main); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back { background: var(--card-bg); color: var(--main); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; text-shadow: 0 0 5px #000; }
        .front { background: #fff; transform: rotateY(180deg); border-color: var(--gold); }
        .front img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .reversed img { transform: rotate(180deg); }
        #report { text-align: left; background: rgba(0,12,35,0.85); padding: 20px; border-radius: 15px; display: none; border: 1px solid var(--gold); margin-top: 10px; }
        .item { margin-bottom: 18px; border-left: 4px solid var(--gold); padding-left: 12px; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        button { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; color: #000428; margin: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(79,172,254,0.4); }
        button:active { transform: scale(0.95); }
        #saveBtn { background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%); display: none; }
        select { padding: 10px; border-radius: 8px; background: #001529; color: white; border: 1px solid var(--main); width: 100%; max-width: 250px; margin-bottom: 12px; font-size: 16px; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="font-size: 24px; letter-spacing: 2px; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5);">🌌 星空靈感塔羅</h1>
        <div class="menu">
            <select id="spreadType" onchange="initBoard()">
                <option value="1">✨ 每日一抽 (靈感導引)</option>
                <option value="3">⌛ 聖三角 (過去/現在/未來)</option>
                <option value="rel">💞 關係解碼 (你/他/連結)</option>
                <option value="soul">🧘 身心靈 (內在/表象/神性)</option>
                <option value="choice">⚖️ 二選一 (方案A/方案B/建議)</option>
                <option value="week">📅 週運勢 (事業/財富/情感)</option>
                <option value="star">⭐️ 五芒星 (本質/挑戰/環境/建議/結果)</option>
            </select><br>
            <button onclick="initBoard()">重新洗牌啟程</button>
        </div>
        <div id="capture-area">
            <div class="board" id="mainBoard"></div>
            <div id="report"><h3 style="color:var(--gold); margin: 0 0 15px 0; border-bottom: 1px solid var(--gold); padding-bottom: 5px;">📜 星空解讀報告</h3><div id="details"></div></div>
        </div>
        <button id="saveBtn" onclick="saveResult()">📸 保存占卜小卡</button>
    </div>

<script>
    const imgBase = "https://cdn.jsdelivr.net/gh/CiroSantilli/universal-test-files@master/images/tarot/rider-waite-smith/";
    const majorF = ["00-the-fool","01-the-magician","02-the-high-priestess","03-the-empress","04-the-emperor","05-the-hierophant","06-the-lovers","07-the-chariot","08-strength","09-the-hermit","10-wheel-of-fortune","11-justice","12-the-hanged-man","13-death","14-temperance","15-the-devil","16-the-tower","17-the-star","18-the-moon","19-the-sun","20-judgement","21-the-world"];
    const majorL = ["愚者","魔術師","女教皇","皇后","皇帝","教皇","戀人","戰車","力量","隱士","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界"];
    const majorD = { "愚者":"信任直覺，開啟冒險。","魔術師":"資源具備，掌握主動。","女教皇":"沈靜觀察，聆聽直覺。","皇后":"能量豐盛，滋養感受。","皇帝":"理性領導，建立秩序。","教皇":"尋求指引，遵循傳統。","戀人":"心靈連結，關鍵抉擇。","戰車":"意志克服，勇往直前。","力量":"以柔克剛，控制慾望。","隱士":"內省探索，孤獨明燈。","命運之輪":"順應週期，接受轉折。","正義":"因果平衡，誠實面對。","倒吊人":"換個角度，沈思等待。","死神":"結束舊章，迎接重生。","節制":"和諧調和，尋找中庸。","惡魔":"警惕執著，認清枷鎖。","高塔":"震撼重組，瓦解虛假。","星星":"希望回升，平靜修復。","月亮":"迷霧不安，穿透潛意識。","太陽":"光明快樂，大放異彩。","審判":"甦醒覺悟，過去轉化。","世界":"圓滿結束，完美境界。" };

    const sName = {"權杖":"wands","聖杯":"cups","寶劍":"swords","錢幣":"pentacles"};
    const rFile = {"A":"ace","2":"02","3":"03","4":"04","5":"05","6":"06","7":"07","8":"08","9":"09","10":"10","侍者":"page","騎士":"knight","皇后":"queen","國王":"king"};
    const sDesc = {"權杖":"行動、熱情與擴張","聖杯":"情感、直覺與關係","寶劍":"邏輯、思考與挑戰","錢幣":"物質、財務與穩定"};
    const rDesc = {"A":"事物的開端與純粹潛力。","2":"權衡、選擇與對立平衡。","3":"初步成果、專業與團隊。","4":"穩固、保守與守護現狀。","5":"變動、損失與混亂挑戰。","6":"和諧回饋、分享與度過。","7":"防禦、堅持與自我評估。","8":"效率、速度與持續努力。","9":"成就頂點、豐盛與獨立。","10":"循環結束、圓滿與傳承。","侍者":"新消息、好奇與學習。","騎士":"執行力、衝勁與進展。","皇后":"掌控、滋養與內在繁榮。","國王":"權威、穩健與實質成功。"};

    let fullDeck = [];
    majorL.forEach((n, i) => fullDeck.push({ n, img: `${imgBase}${majorF[i]}.jpg`, t:'M' }));
    Object.keys(sName).forEach(s => Object.keys(rFile).forEach(r => {
        fullDeck.push({ n: s+r, img: `${imgBase}${sName[s]}-${rFile[r]}.jpg`, t:'m', s, r });
    }));

    const spr = { "1":["今日啟示"],"3":["過去","現在","未來"],"rel":["你","他","連結"],"soul":["身","心","靈"],"choice":["方案A","方案B","指引"],"week":["事業運","財富運","情感運"],"star":["本質","挑戰","策略","環境","結果"] };

    function initBoard() {
        const type = document.getElementById('spreadType').value;
        const b = document.getElementById('mainBoard');
        b.innerHTML = ''; document.getElementById('report').style.display='none';
        document.getElementById('details').innerHTML=''; document.getElementById('saveBtn').style.display='none';
        let shuf = [...fullDeck].sort(() => Math.random() - 0.5);
        spr[type].forEach(pos => {
            const card = shuf.pop();
            const isR = Math.random() > 0.35;
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            slot.innerHTML = `<div class="inner"><div class="back"><b>${pos}</b></div><div class="front ${isR?'reversed':''}"><img src="${card.img}" loading="lazy" alt="${card.n}"></div></div>`;
            slot.onclick = () => {
                if(!slot.classList.contains('flipped')) {
                    slot.classList.add('flipped');
                    addText(pos, card, isR);
                    if(document.querySelectorAll('.flipped').length === spr[type].length) document.getElementById('saveBtn').style.display='inline-block';
                }
            };
            b.appendChild(slot);
        });
    }

    function addText(p, c, r) {
        document.getElementById('report').style.display='block';
        let main = c.t === 'M' ? majorD[c.n] : `關於「${sDesc[c.s]}」。${rDesc[c.r]}`;
        let sub = r ? "（逆位提醒：能量受阻或分配不均，建議回頭檢視心態，不要急於推進。）" : "（正位導引：能量正值巔峰，請順勢而為，把握當前機會。）";
        document.getElementById('details').innerHTML += `<div class="item"><b>【${p}】${c.n} (${r?'逆':'正'})</b><br>✦ ${main}<br>✦ ${sub}</div>`;
    }

    async function saveResult() {
        const btn = document.getElementById('saveBtn'); btn.style.display = 'none';
        const canvas = await html2canvas(document.getElementById('capture-area'), {backgroundColor:'#000428', useCORS: true, scale: 2});
        const link = document.createElement('a'); link.download=`星空占卜_${new Date().getTime()}.png`; link.href=canvas.toDataURL(); link.click();
        btn.style.display = 'inline-block';
    }
    initBoard();
</script>
</body>
</html>
