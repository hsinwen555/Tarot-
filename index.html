<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空靈感塔羅 - 穩定進階版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main: #4facfe; --bg: #000428; --card: #004e92; --gold: #ffd700; }
        body { background: radial-gradient(circle at center, #004e92 0%, #000428 100%); color: #fff; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .menu { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(79,172,254,0.3); }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .card-slot { width: 85px; height: 145px; cursor: pointer; perspective: 1000px; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-slot.flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 2px solid var(--main); display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .back { background: var(--card); color: var(--main); font-weight: bold; font-size: 13px; text-align: center; }
        .front { background: white; transform: rotateY(180deg); color: #000428; flex-direction: column; border-color: var(--gold); font-size: 14px; font-weight: bold; }
        .reversed { transform: rotateY(180deg) rotateZ(180deg); }
        #report { margin-top: 25px; background: rgba(0,10,30,0.9); padding: 20px; border-radius: 15px; display: none; text-align: left; border: 1px solid var(--gold); }
        .reading-item { margin-bottom: 15px; border-left: 4px solid var(--gold); padding-left: 12px; padding: 8px; background: rgba(255,255,255,0.05); }
        button { background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 5px; }
        .save-btn { background: linear-gradient(135deg, #ffd700, #ffa500); display: none; }
        select { padding: 10px; border-radius: 8px; background: #001529; color: white; border: 1px solid var(--main); width: 100%; max-width: 250px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 星空靈感塔羅</h1>
        <div class="menu">
            <select id="spreadType" onchange="initBoard()">
                <option value="1">✨ 每日一抽</option>
                <option value="3">⌛ 聖三角 (過/現/未)</option>
                <option value="rel">💞 關係解碼 (你/他/連結)</option>
                <option value="soul">🧘 身心靈 (身/心/靈)</option>
                <option value="choice">⚖️ 二選一 (A/B/建議)</option>
                <option value="week">📅 週運勢 (工作/財運/心靈)</option>
                <option value="star">⭐️ 五芒星 (本質/挑戰/建議)</option>
            </select>
            <button onclick="initBoard()">重新洗牌</button>
        </div>
        <div id="capture-area">
            <div class="board" id="board"></div>
            <div id="report"><h3 style="color:var(--gold);">📜 星空解讀報告</h3><div id="details"></div></div>
        </div>
        <button id="saveBtn" class="save-btn" onclick="saveAsImage()">📸 保存占卜小卡</button>
    </div>

    <script>
        const cardMeanings = { "愚者":"新的開始。信任宇宙。","魔術師":"創造力十足。點石成金。","女教皇":"直覺敏銳。靜待時機。","皇后":"豐饒多產。愛與美。","皇帝":"權威穩定。理智領導。","教皇":"尋求導引。遵循傳統。","戀人":"心靈契合。關鍵選擇。","戰車":"意志堅強。克服萬難。","力量":"溫柔剛毅。內在勇氣。","隱士":"內省探索。沈思明燈。","命運之輪":"命運轉折。接受變化。","正義":"因果報應。公正誠實。","倒吊人":"換位思考。等待啟示。","死神":"結束重生。勇敢斷捨離。","節制":"調和平衡。中庸之道。","惡魔":"警惕執著。認清束縛。","高塔":"毀滅重建。摧毀幻象。","星星":"希望降臨。平靜指引。","月亮":"穿透不安。相信潛意識。","太陽":"光明成功。活力四射。","審判":"甦醒重生。過去的轉化。","世界":"圓滿成就。旅程終點。" };
        const suitData = { "權杖":"行動與熱情", "聖杯":"情感與關係", "寶劍":"思緒與挑戰", "錢幣":"物質與財務" };
        const rankData = { "A":"開端","2":"平衡","3":"擴張","4":"穩定","5":"衝突","6":"和諧","7":"堅持","8":"效率","9":"豐盛","10":"循環","侍者":"新消息","騎士":"衝勁","皇后":"滋養","國王":"權威" };

        function initBoard() {
            const type = document.getElementById('spreadType').value;
            const board = document.getElementById('board');
            board.innerHTML = ''; document.getElementById('report').style.display = 'none';
            document.getElementById('details').innerHTML = '';
            document.getElementById('saveBtn').style.display = 'none';

            const deck = [];
            Object.keys(cardMeanings).forEach(n => deck.push(n));
            Object.keys(suitData).forEach(s => Object.keys(rankData).forEach(r => deck.push(s+r)));
            let shuffled = deck.sort(() => Math.random() - 0.5);

            const spreads = { "1":["今日"],"3":["過去","現在","未來"],"rel":["你","他","連結"],"soul":["身","心","靈"],"choice":["A案","B案","建議"],"week":["事業","財富","心靈"],"star":["本質","挑戰","建議","環境","結果"] };
            spreads[type].forEach(pos => {
                const name = shuffled.pop();
                const isRev = Math.random() > 0.35;
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `<div class="inner"><div class="back">${pos}</div><div class="front ${isRev?'reversed':''}">${name}</div></div>`;
                slot.onclick = () => {
                    if(!slot.classList.contains('flipped')) {
                        slot.classList.add('flipped');
                        showReading(pos, name, isRev);
                        if(document.querySelectorAll('.flipped').length === spreads[type].length) document.getElementById('saveBtn').style.display = 'inline-block';
                    }
                };
                board.appendChild(slot);
            });
        }

        function showReading(pos, name, isRev) {
            document.getElementById('report').style.display = 'block';
            let msg = cardMeanings[name] || `這張牌關乎${suitData[name.substring(0,2)]}中的「${rankData[name.substring(2)]}」能量。`;
            if (isRev) msg = "（逆位）" + msg.replace("。", "，") + "目前能量受阻或過度。";
            document.getElementById('details').innerHTML += `<div class="reading-item"><strong>【${pos}】${name}</strong><br>${msg}</div>`;
        }

        async function saveAsImage() {
            const canvas = await html2canvas(document.getElementById('capture-area'), { backgroundColor: '#000428', scale: 2 });
            const link = document.createElement('a'); link.download = '占卜報告.png'; link.href = canvas.toDataURL(); link.click();
        }
        initBoard();
    </script>
</body>
</html>
