<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空靈感塔羅 - 靈魂對話版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main: #4facfe; --bg: #000428; --card: #004e92; --gold: #ffd700; }
        body { 
            background: radial-gradient(circle at center, #004e92 0%, #000428 100%); 
            color: #fff; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            text-align: center; padding: 20px; margin: 0; min-height: 100vh; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        .menu { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(79,172,254,0.3); backdrop-filter: blur(10px); }
        #capture-area { padding: 20px; border-radius: 20px; background: transparent; }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; perspective: 1000px; margin: 20px 0; }
        .card-slot { width: 100px; height: 170px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-slot.flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid var(--main); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back { background: var(--card); display: flex; align-items: center; justify-content: center; color: var(--main); font-weight: bold; font-size: 14px; text-align: center; padding: 5px; box-sizing: border-box; }
        .front { background: white; transform: rotateY(180deg); color: #004e92; display: flex; align-items: center; justify-content: center; font-weight: bold; border-color: var(--gold); text-align: center; padding: 8px; box-sizing: border-box; font-size: 16px; }
        .reversed { transform: rotateY(180deg) rotateZ(180deg); } /* 逆位視覺效果 */
        #report { margin-top: 25px; background: rgba(0,10,30,0.85); padding: 25px; border-radius: 20px; display: none; text-align: left; line-height: 1.8; border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .reading-item { margin-bottom: 20px; border-left: 4px solid var(--gold); padding-left: 15px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 0 10px 10px 0; }
        button { background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; color: #000; font-size: 16px; transition: 0.3s; margin: 5px; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--main); }
        .save-btn { background: linear-gradient(135deg, #ffd700, #ffa500); display: none; }
        select { padding: 10px; border-radius: 8px; background: #001529; color: white; border: 1px solid var(--main); cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌌 星空靈感塔羅</h1>
        <p style="opacity: 0.8; font-size: 14px;">隨機正逆位 · 四大深度牌陣</p>
        
        <div class="menu">
            <select id="spreadType" onchange="initBoard()">
                <option value="1">✨ 每日一抽 (單張指引)</option>
                <option value="3">⌛ 聖三角 (過去/現在/未來)</option>
                <option value="rel">💞 關係解碼 (你/他/連結)</option>
                <option value="soul">🧘 身心靈 (身體/情緒/靈魂)</option>
            </select>
            <button onclick="initBoard()">重新洗牌</button>
        </div>

        <div id="capture-area">
            <div class="board" id="board"></div>
            <div id="report">
                <h3 style="color:var(--gold); border-bottom: 2px solid rgba(255,215,0,0.3); padding-bottom: 10px; margin-top: 0;">📜 星辰的私語</h3>
                <div id="details"></div>
            </div>
        </div>

        <button id="saveBtn" class="save-btn" onclick="saveAsImage()">📸 保存占卜小卡</button>
    </div>

    <script>
        const cardMeanings = {
            "愚者": "這是一個全新的開始。拋開恐懼，像孩子一樣純粹地出發吧。",
            "魔術師": "你擁有創造一切的工具。專注你的意志，奇蹟就會發生。",
            "女教皇": "靜止中有巨大的力量。聽從你的直覺，答案就在沈默中。",
            "皇后": "豐富與慈愛圍繞著你。去感受美與愛，讓計畫自然綻放。",
            "皇帝": "權威與結構的時刻。用理智領導，建立穩固的基礎。",
            "教皇": "尋求指引或遵循傳統。這是一個學習與傳承的過程。",
            "戀人": "面臨心靈的選擇。請選擇那個讓你感到完整與和諧的方向。",
            "戰車": "勝利屬於意志堅定的人。掌控你的情緒，全速前進。",
            "力量": "溫柔比拳頭更有力。用勇氣馴服你內在的焦慮與野獸。",
            "隱士": "暫時退回到內心。在孤獨中，你會看見指引未來的光燈。",
            "命運之輪": "改變正在發生。順應循環，好運往往藏在轉折點。",
            "正義": "公平與真理。誠實地面對現況，事情將得到應有的回報。",
            "倒吊人": "換個角度思考。犧牲當前的固執，會換來深刻的新見解。",
            "死神": "結束是為了重生。勇敢割捨不再適合你的事物，騰出空間。",
            "節制": "平衡與調和。在衝突的力量中找到你的中庸之道。",
            "惡魔": "警惕你的執著。看清楚是什麼束縛了你，鑰匙就在手邊。",
            "高塔": "震盪與瓦解。雖然痛苦，但這會摧毀假象，重現真實。",
            "星星": "希望與寧靜。最黑暗的時刻已過，黎明與祝福即將到來。",
            "月亮": "穿過不安與幻覺。雖然現況模糊，但請相信你的直覺。",
            "太陽": "純粹的快樂與成功。你是耀眼的，大膽展現你的光芒吧。",
            "審判": "召喚與重生的時刻。過去的經驗已轉化成智慧，迎接新生命。",
            "世界": "圓滿與成就。一個階段完美的結束，準備好進入新旅程。"
        };

        const suits = ["權杖", "聖杯", "寶劍", "錢幣"];
        const elementMsg = { "權杖": "行動力", "聖杯": "情感面", "寶劍": "思考力", "錢幣": "物質穩定" };
        const cards = Object.keys(cardMeanings);
        suits.forEach(s => [..."A23456789", "10", "侍者", "騎士", "皇后", "國王"].forEach(r => cards.push(s+r)));

        const spreads = {
            "1": ["當下啟示"],
            "3": ["過去的根源", "現狀的挑戰", "未來的走向"],
            "rel": ["你的狀態", "對方的想法", "彼此的連結"],
            "soul": ["身體能量", "心理情緒", "靈魂訊息"]
        };

        function initBoard() {
            const type = document.getElementById('spreadType').value;
            const board = document.getElementById('board');
            board.innerHTML = ''; 
            document.getElementById('report').style.display = 'none';
            document.getElementById('details').innerHTML = '';
            document.getElementById('saveBtn').style.display = 'none';
            
            let shuffled = [...cards].sort(() => Math.random() - 0.5);
            let posNames = spreads[type];

            posNames.forEach(pos => {
                const cardName = shuffled.pop();
                const isRev = Math.random() > 0.35; // 35% 逆位機率
                
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="inner">
                        <div class="back">✨<br>${pos}</div>
                        <div class="front ${isRev ? 'reversed' : ''}">${cardName}${isRev ? '<br>(逆位)' : '<br>(正位)'}</div>
                    </div>`;
                
                slot.onclick = () => {
                    if(!slot.classList.contains('flipped')) {
                        slot.classList.add('flipped');
                        showReading(pos, cardName, isRev);
                        if(document.querySelectorAll('.flipped').length === posNames.length) {
                            document.getElementById('saveBtn').style.display = 'inline-block';
                        }
                    }
                };
                board.appendChild(slot);
            });
        }

        function showReading(pos, card, isRev) {
            document.getElementById('report').style.display = 'block';
            let msg = cardMeanings[card] || "";
            
            // 如果是小牌 (56張)，生成元素解讀
            if (!msg) {
                const suit = card.substring(0, 2);
                msg = `這張牌關乎「${elementMsg[suit]}」。${isRev ? '目前能量有些停滯或過度，建議回歸初衷。' : '這個部分的能量非常充沛，適合順勢而為。'}`;
            }

            // 逆位文字調整
            if (isRev && cardMeanings[card]) {
                msg = "（逆位提醒）" + msg.replace("。", "，") + "但目前受到內在恐懼或環境延遲的阻礙，請保持耐性。";
            }

            document.getElementById('details').innerHTML += `
                <div class="reading-item">
                    <strong style="color:var(--main)">【${pos} · ${card}${isRev?'(逆)':'(正)'}】</strong><br>
                    <span>${msg}</span>
                </div>`;
        }

        async function saveAsImage() {
            const area = document.getElementById('capture-area');
            const canvas = await html2canvas(area, { backgroundColor: '#000428', scale: 2 });
            const link = document.createElement('a');
            link.download = '星空塔羅占卜結果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        initBoard();
    </script>
</body>
</html>
