<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空塔羅 - AI 靈魂對話</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main: #4facfe; --bg: #000428; --card: #004e92; --gold: #ffd700; }
        body { 
            background: radial-gradient(circle at center, #004e92 0%, #000428 100%); 
            color: #fff; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            text-align: center; padding: 20px; margin: 0; min-height: 100vh; 
        }
        .container { max-width: 600px; margin: 0 auto; }
        .setup-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; border: 1px solid rgba(79,172,254,0.3); margin-bottom: 20px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid var(--main); width: 85%; margin: 10px 0; background: #001529; color: #fff; }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; perspective: 1000px; margin: 20px 0; }
        .card-slot { width: 95px; height: 165px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-slot.flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid var(--main); }
        .back { background: var(--card); display: flex; align-items: center; justify-content: center; color: var(--main); font-weight: bold; }
        .front { background: white; transform: rotateY(180deg); color: #004e92; display: flex; align-items: center; justify-content: center; font-weight: bold; border-color: var(--gold); text-align: center; padding: 5px; }
        #ai-box { margin-top: 25px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; display: none; text-align: left; line-height: 1.8; border: 1px solid var(--gold); white-space: pre-wrap; }
        button { background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; margin-top: 10px; }
        .loading { display: none; color: var(--gold); margin: 15px; font-style: italic; }
        a { color: var(--main); text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌌 星空靈感塔羅</h1>

        <div class="setup-box">
            <div style="font-size: 14px;">🔑 請貼上您的 Gemini API Key</div>
            <input type="password" id="userApiKey" placeholder="在此貼上 API Key...">
            <br><a href="https://aistudio.google.com/app/apikey" target="_blank">👉 點此免費申請 Key</a>
            <div style="margin-top: 15px;">
                <select id="spreadType" onchange="initBoard()" style="padding: 8px; border-radius: 5px; background: #001529; color: white; border: 1px solid var(--main);">
                    <option value="1">每日一抽</option>
                    <option value="3">聖三角 (過/現/未)</option>
                </select>
                <button onclick="initBoard()">開始洗牌</button>
            </div>
        </div>

        <div class="board" id="board"></div>
        <div id="loading" class="loading">✨ 正在連結星辰與 Gemini...</div>
        <div id="ai-box"></div>
    </div>

    <script>
        const cards = ["愚者","魔術師","女教皇","皇后","皇帝","教皇","戀人","戰車","力量","隱士","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界","權杖A","權杖2","權杖3","權杖4","權杖5","權杖6","權杖7","權杖8","權杖9","權杖10","權杖侍者","權杖騎士","權杖皇后","權杖國王","聖杯A","聖杯2","聖杯3","聖杯4","聖杯5","聖杯6","聖杯7","聖杯8","聖杯9","聖杯10","聖杯侍者","聖杯騎士","聖杯皇后","聖杯國王","寶劍A","寶劍2","寶劍3","寶劍4","寶劍5","寶劍6","寶劍7","寶劍8","寶劍9","寶劍10","寶劍侍者","寶劍騎士","寶劍皇后","寶劍國王","錢幣A","錢幣2","錢幣3","錢幣4","錢幣5","錢幣6","錢幣7","錢幣8","錢幣9","錢幣10","錢幣侍者","錢幣騎士","錢幣皇后","錢幣國王"];
        let currentReading = [];

        // 讀取存過的 Key
        window.onload = () => {
            const savedKey = localStorage.getItem('my_tarot_key');
            if (savedKey) document.getElementById('userApiKey').value = savedKey;
        };

        function initBoard() {
            const type = document.getElementById('spreadType').value;
            const board = document.getElementById('board');
            board.innerHTML = ''; currentReading = [];
            document.getElementById('ai-box').style.display = 'none';
            
            let shuffled = [...cards].sort(() => Math.random() - 0.5);
            let posNames = type === "1" ? ["啟示"] : ["過去", "現在", "未來"];

            posNames.forEach(pos => {
                const card = shuffled.pop();
                const isRev = Math.random() > 0.35;
                currentReading.push(`${pos}: ${card}${isRev?'(逆位)':'(正位)'}`);
                
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="inner">
                        <div class="back">✨<br>${pos}</div>
                        <div class="front">${card}${isRev?'<br>(逆位)':''}</div>
                    </div>`;
                slot.onclick = () => {
                    slot.classList.add('flipped');
                    if (document.querySelectorAll('.flipped').length == posNames.length) {
                        document.getElementById('ai-box').style.display = 'block';
                        document.getElementById('ai-box').innerHTML = '<button style="width:100%" onclick="askAI()">🔮 請求 Gemini 即時解讀</button>';
                    }
                };
                board.appendChild(slot);
            });
        }

        async function askAI() {
            const key = document.getElementById('userApiKey').value;
            if (!key) return alert("請貼上 API Key 才能開始占卜！");
            localStorage.setItem('my_tarot_key', key);

            document.getElementById('loading').style.display = 'block';
            const prompt = `你是一位靈魂塔羅大師，擅長用溫暖、詩意且精確的語言引導迷惘的人。我抽到了：${currentReading.join(', ')}。請針對我的牌陣進行約 300 字的深度解讀，告訴我宇宙想給我的具體啟發。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ai-box').innerHTML = `<strong>✨ 星辰的指引：</strong><br><br>${text}`;
            } catch (error) {
                alert("API Key 無效或網路問題，請重新確認。");
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
