<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空塔羅 - 靈魂覺醒版</title>
    <style>
        :root { --primary:#FFD700; --accent:#00CED1; --bg:#0b0b0b; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background:var(--bg); color:#eee; padding:20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align:center; color:var(--accent); letter-spacing: 5px; text-shadow: 0 0 10px var(--accent); }
        .controls { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        select, button { padding:10px; border-radius: 8px; border: 1px solid #333; font-size: 16px; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #board { display:flex; flex-wrap:wrap; justify-content:center; gap: 15px; margin: 20px 0; }
        .card { border:1px solid #444; border-radius:12px; padding:15px; width:100px; text-align:center; background:#111; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card .sym { font-size: 2em; }
        .reversed { transform: rotate(180deg); border-color: var(--primary); }
        #report { background:#161616; padding:25px; border-radius:15px; border:1px solid #333; margin-top:20px; }
        .oracle-section { margin-bottom:20px; padding:15px; border-left: 4px solid var(--accent); background: rgba(255,255,255,0.02); }
        .oracle-title { font-weight:bold; color:var(--primary); display: block; margin-bottom: 10px; font-size: 1.1em; }
        .tag { display:inline-block; padding:2px 8px; border-radius:4px; background:#333; margin-right:8px; font-size:0.85em; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1>✦ 星 空 塔 羅 ✦</h1>
    <div class="controls">
        <select id="spread">
            <option value="1">每日啟示</option>
            <option value="3">時間之流 (3張)</option>
            <option value="rel">關係星盤 (5張)</option>
        </select>
        <button onclick="draw()">開啟占卜</button>
    </div>
    <div id="board"></div>
    <div id="report" style="display:none;"></div>
</div>

<script>
const tarotData = {
    majors: [
        { name: "愚者", symbol: "🃏", up: "純真與無限可能", rev: "盲目與魯莽衝動" },
        { name: "魔術師", symbol: "🪄", up: "掌握資源與顯化", rev: "能力錯位或欺瞞" },
        { name: "女教皇", symbol: "🌙", up: "內在直覺與靜默", rev: "隱瞞與忽略直覺" },
        { name: "女皇", symbol: "🌿", up: "感官享受與豐盛", rev: "情感索求或匱乏" },
        { name: "皇帝", symbol: "👑", up: "穩定結構與權威", rev: "掌控欲強或僵化" },
        { name: "教皇", symbol: "🕊️", up: "傳統價值與指引", rev: "盲從或打破規範" },
        { name: "戀人", symbol: "❤️", up: "和諧選擇與結合", rev: "價值觀衝突或逃避" },
        { name: "戰車", symbol: "⚔️", up: "意志力與勝利", rev: "失控或侵略性" },
        { name: "力量", symbol: "🦁", up: "內在掌控力", rev: "自我懷疑或軟弱" },
        { name: "隱士", symbol: "🕯️", up: "反省與真理", rev: "孤立或逃避現實" },
        { name: "命運之輪", symbol: "🎡", up: "轉折點與命運", rev: "抵抗改變或厄運" },
        { name: "正義", symbol: "⚖️", up: "公平與責任", rev: "不公或推卸責任" },
        { name: "倒吊人", symbol: "🦶", up: "新視角與犧牲", rev: "拖延或無謂犧牲" },
        { name: "死神", symbol: "💀", up: "終結與重生", rev: "執著過去或恐懼" },
        { name: "節制", symbol: "🏺", up: "平衡與療癒", rev: "失衡或極端" },
        { name: "惡魔", symbol: "🔥", up: "慾望與束縛", rev: "解脫與覺醒" },
        { name: "高塔", symbol: "⚡", up: "劇變與真相", rev: "逃避現實" },
        { name: "星星", symbol: "✨", up: "希望與靈感", rev: "信心瓦解" },
        { name: "月亮", symbol: "🔮", up: "潛意識迷霧", rev: "真相大白" },
        { name: "太陽", symbol: "☀️", up: "成功與活力", rev: "消極或失落" },
        { name: "審判", symbol: "🎺", up: "重生與召喚", rev: "自我懷疑" },
        { name: "世界", symbol: "🌍", up: "圓滿與統合", rev: "未完成" }
    ],
    suits: {
        "權杖": { sym: "🔥", el: "行動/火", upAction: "積極開創", revAction: "能量空轉" },
        "聖杯": { sym: "💧", el: "情感/水", upAction: "情感滋養", revAction: "情緒氾濫" },
        "寶劍": { sym: "🌪️", el: "思考/風", upAction: "理智決斷", revAction: "心智混亂" },
        "錢幣": { sym: "🌱", el: "物質/地", upAction: "務實累積", revAction: "資源流失" }
    }
};

const rankMeanings = {
    "王牌": "全新的種子與契機", "2": "對立與選擇的時刻", "3": "初步的擴張與合作",
    "4": "穩固但稍顯封閉的現狀", "5": "混亂與失去的挑戰", "6": "和諧的交流與回饋",
    "7": "評估現狀與心理掙扎", "8": "極速的變動與頻繁活動", "9": "即將圓滿前的心理轉化",
    "10": "最終結果的顯現", "侍者": "初學者的好奇與訊息", "騎士": "強烈的行動力與衝刺",
    "皇后": "母性的守護與滋養", "國王": "成熟的領導與掌握"
};

let fullDeck = [];
function init() {
    fullDeck = [...tarotData.majors];
    Object.keys(tarotData.suits).forEach(s => {
        Object.keys(rankMeanings).forEach(r => {
            fullDeck.push({ name: s + r, suit: s, rank: r });
        });
    });
}
init();

function getAdvice(card, isRev, label) {
    if (!card.suit) {
        return {
            ins: isRev ? `【大命運受阻】「${label}」遇到核心抗拒，請停止與現實對抗。` : `【宇宙信號】「${label}」顯示這是命運的安排，請順勢而為。`,
            act: isRev ? "暫緩決定，回到內心靜坐。" : "勇敢行動，這是顯化夢想的好時機。"
        };
    }
    const suitInfo = tarotData.suits[card.suit];
    const rMean = rankMeanings[card.rank];
    
    // 徹底區分每一張小牌的洞察
    let ins = isRev ? `【${card.suit}${card.rank} 能量逆流】「${label}」顯示你在${rMean}的過程中感到迷茫或受困。` 
                    : `【${card.suit}${card.rank} 能量啟動】「${label}」顯示你正順應${rMean}的趨勢穩步前行。`;
    
    // 針對特定的牌給予「大師級」叮嚀（避免重複）
    let act = "";
    if (card.rank === "騎士") act = isRev ? `不要魯莽！${suitInfo.el}能量過衝，請檢查細節。` : `衝刺吧！發揮${suitInfo.upAction}，主動奪回掌控權。`;
    else if (card.rank === "9") act = isRev ? `放下焦慮。${suitInfo.el}的陰影正在消散，請接受援助。` : `內省時刻。在${rMean}中尋找內在平衡。`;
    else act = isRev ? `調整${suitInfo.el}。目前不宜強求${rMean}。` : `發揮${suitInfo.upAction}，在${rMean}中獲取成功。`;

    return { ins, act };
}

function draw() {
    const spreadKey = document.getElementById('spread').value;
    const labels = spreads[spreadKey];
    const shuffled = [...fullDeck].sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, labels.length);
    const board = document.getElementById('board');
    const report = document.getElementById('report');
    
    board.innerHTML = ''; report.style.display = 'block';
    report.innerHTML = `<h2 style="text-align:center;color:var(--accent)">✦ 大 師 啟 示 ✦</h2>`;
    
    selected.forEach((card, i) => {
        const isRev = Math.random() > 0.5;
        const advice = getAdvice(card, isRev, labels[i]);
        const symbol = card.suit ? tarotData.suits[card.suit].sym : card.symbol;

        const cardDiv = document.createElement('div');
        cardDiv.className = `card ${isRev ? 'reversed' : ''}`;
        cardDiv.innerHTML = `<div class="sym">${symbol}</div><div>${card.name}</div><div style="font-size:0.8em">${isRev?'逆位':'正位'}</div>`;
        board.appendChild(cardDiv);

        report.innerHTML += `<div class="oracle-section">
            <span class="oracle-title">位置：${labels[i]}｜${card.name} (${isRev?'逆位':'正位'})</span>
            <p><span class="tag">洞察</span>${advice.ins}</p>
            <p><span class="tag" style="background:var(--primary);color:#000">行動建議</span>${advice.act}</p>
        </div>`;
    });
}
const spreads = { "1":["今日啟示"], "3":["過去背景","現在現狀","未來趨勢"], "rel":["你","他","互動","阻礙","建議"] };
</script>
</body>
</html>
